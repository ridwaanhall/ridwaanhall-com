<!-- Twitter/X -->
<a
    href="https://twitter.com/intent/tweet?url={{ request.build_absolute_uri|urlencode }}&text={{ blog.title|urlencode }}"
    target="_blank"
    rel="noopener noreferrer"
    class="relative group flex items-center justify-center w-8 h-8 sm:w-9 sm:h-9 rounded-full bg-zinc-800/90 hover:bg-zinc-700/90 transition-all duration-300 shadow-sm hover:shadow-md"
    aria-label="Share on Twitter/X"
>
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24" class="text-zinc-300 group-hover:text-white">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
    </svg>
    <span
        class="absolute left-1/2 -translate-x-1/2 -top-8 w-max bg-zinc-300 text-zinc-900 text-xs px-2 py-1 rounded opacity-0 translate-y-2 transition-all duration-200 ease-out group-hover:opacity-100 group-hover:translate-y-0 pointer-events-none whitespace-nowrap before:content-[''] before:absolute before:left-1/2 before:top-full before:-translate-x-1/2 before:border-4 before:border-transparent before:border-t-zinc-300"
    >
        Share on Twitter
    </span>
    <span class="sr-only">Share on Twitter/X</span>
</a>

    aria-label="Share on Facebook"
>
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24" class="text-zinc-300 group-hover:text-white">
        <path d="M9.198 21.5h4v-8.01h3.604l.396-3.98h-4V7.5a1 1 0 0 1 1-1h3v-4h-3a5 5 0 0 0-5 5v2.01h-2l-.396 3.98h2.396v8.01Z" />
    </svg>
    <span
        class="absolute left-1/2 -translate-x-1/2 -top-8 w-max bg-zinc-300 text-zinc-900 text-xs px-2 py-1 rounded opacity-0 translate-y-2 transition-all duration-200 ease-out group-hover:opacity-100 group-hover:translate-y-0 pointer-events-none whitespace-nowrap before:content-[''] before:absolute before:left-1/2 before:top-full before:-translate-x-1/2 before:border-4 before:border-transparent before:border-t-zinc-300"
    >
        Share on Facebook
    </span>
    <span class="sr-only">Share on Facebook</span>
</a>

<!-- LinkedIn -->

    target="_blank"
    rel="noopener noreferrer"
    class="relative group flex items-center justify-center w-8 h-8 sm:w-9 sm:h-9 rounded-full bg-zinc-800/90 hover:bg-zinc-700/90 transition-all duration-300 shadow-sm hover:shadow-md"
    aria-label="Share on LinkedIn"
>
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24" class="text-zinc-300 group-hover:text-white">

        Share on LinkedIn
    </span>
    <span class="sr-only">Share on LinkedIn</span>
</a>

<!-- Gmail -->
<a
    href="mailto:?subject={{ blog.title|urlencode }}&body={{ blog.description|urlencode }}%0A%0A{{ request.build_absolute_uri|urlencode }}"
    class="relative group flex items-center justify-center w-8 h-8 sm:w-9 sm:h-9 rounded-full bg-zinc-800/90 hover:bg-zinc-700/90 transition-all duration-300 shadow-sm hover:shadow-md"
    aria-label="Share via Email"
>
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24" class="text-zinc-300 group-hover:text-white">
        <path d="M3 3h18a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1zm9.06 8.683L5.648 6.238 4.353 7.762l7.72 6.555 7.581-6.56-1.308-1.513-6.285 5.439z" />
    </svg>
    <span
        class="absolute left-1/2 -translate-x-1/2 -top-8 w-max bg-zinc-300 text-zinc-900 text-xs px-2 py-1 rounded opacity-0 translate-y-2 transition-all duration-200 ease-out group-hover:opacity-100 group-hover:translate-y-0 pointer-events-none whitespace-nowrap before:content-[''] before:absolute before:left-1/2 before:top-full before:-translate-x-1/2 before:border-4 before:border-transparent before:border-t-zinc-300"
    >
        Share via Email
    </span>
    <span class="sr-only">Share via Email</span>
</a>

<!-- Copy Link Button -->
<button
    onclick="copyToClipboard('{{ request.build_absolute_uri }}')"
    class="relative group cursor-pointer flex items-center justify-center w-8 h-8 sm:w-9 sm:h-9 rounded-full bg-zinc-800/90 hover:bg-zinc-700/90 transition-all duration-300 shadow-sm hover:shadow-md focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 focus:ring-offset-zinc-900"
    aria-label="Copy link to clipboard"
>
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24" class="text-zinc-300 group-hover:text-white">
        <path
            d="M13.17 7.83a4 4 0 1 1 5.66 5.66l-2.83 2.83a4 4 0 0 1-5.66 0 1 1 0 0 1 1.42-1.42 2 2 0 0 0 2.82 0l2.83-2.83a2 2 0 0 0-2.82-2.82l-1.42 1.41a1 1 0 0 1-1.41-1.41l1.41-1.42zM6.17 13.17a4 4 0 0 1 0-5.66l2.83-2.83a4 4 0 0 1 5.66 0 1 1 0 0 1-1.42 1.42a2 2 0 0 0-2.82 0L7.59 8.93a2 2 0 0 0 0 2.82l1.42-1.41a1 1 0 1 1 1.41 1.41l-1.41 1.42a4 4 0 0 1-2.84 0z"
        />
    </svg>
    <span
        class="hover-tooltip absolute left-1/2 -translate-x-1/2 -top-8 w-max bg-zinc-300 text-zinc-900 text-xs px-2 py-1 rounded opacity-0 translate-y-2 transition-all duration-200 ease-out group-hover:opacity-100 group-hover:translate-y-0 pointer-events-none whitespace-nowrap before:content-[''] before:absolute before:left-1/2 before:top-full before:-translate-x-1/2 before:border-4 before:border-transparent before:border-t-zinc-300"
    >
        Copy link
    </span>
    <span
        id="copyTooltip"
        class="copy-success-tooltip absolute left-1/2 -translate-x-1/2 -top-8 w-max bg-green-600 text-white text-xs px-2 py-1 rounded opacity-0 translate-y-2 transition-all duration-200 ease-out pointer-events-none whitespace-nowrap before:content-[''] before:absolute before:left-1/2 before:top-full before:-translate-x-1/2 before:border-4 before:border-transparent before:border-t-green-600"
    >
        ✓ Link copied!
    </span>
</button>
