<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body style="margin:0;padding:0;background:#E5E2DB;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;-webkit-font-smoothing:antialiased;">

    <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" bgcolor="#E5E2DB">
        <tr>
            <td align="center" style="padding:40px 16px;">

                <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width:680px;background:#FAF9F7;">

                    <tr>
                        <td bgcolor="#F5F3EF" style="border-bottom:1px solid #E2DFD8;padding:14px 24px;">
                            <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td valign="middle">
                                        <table role="presentation" border="0" cellpadding="0" cellspacing="0">
                                            <tr>
                                                <td bgcolor="#CC6138" width="24" style="width:24px;height:24px;border-radius:50%;text-align:center;vertical-align:middle;line-height:24px;">
                                                    <span style="color:#fff;font-size:12px;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">&#x25D0;</span>
                                                </td>
                                                <td style="padding-left:9px;vertical-align:middle;">
                                                    <span style="color:#1A1918;font-size:14px;font-weight:600;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">ridwaanhall.com</span>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                    <td align="right" valign="middle">
                                        <span style="color:#9C9890;font-size:12px;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">New Message</span>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding:28px 24px 8px;">

                            <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom:16px;">
                                <tr>
                                    <td width="36" valign="top" style="padding-right:10px;">
                                        <table role="presentation" border="0" cellpadding="0" cellspacing="0">
                                            <tr>
                                                <td bgcolor="#CC6138" width="24" style="width:24px;height:24px;border-radius:50%;text-align:center;vertical-align:middle;line-height:24px;">
                                                    <span style="color:#fff;font-size:12px;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">&#x25D0;</span>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                    <td valign="top">
                                        <p style="margin:0 0 10px;font-size:15px;line-height:1.65;color:#66635E;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">New contact form submission from <strong style="color:#1A1918;">{{ name }}</strong>.</p>
                                        <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-top:10px;">
                                            <tr>
                                                <td bgcolor="#F0EEE9" style="border-radius:10px;border:1px solid #E2DFD8;padding:4px 14px;">
                                                    <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                                                        <tr>
                                                            <td style="padding:8px 0;border-bottom:1px solid #E2DFD8;width:68px;vertical-align:top;">
                                                                <span style="font-size:12px;color:#9C9890;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">From</span>
                                                            </td>
                                                            <td style="padding:8px 0 8px 12px;border-bottom:1px solid #E2DFD8;vertical-align:top;">
                                                                <span style="font-size:14px;color:#1A1918;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">{{ name }}</span>
                                                            </td>
                                                        </tr>
                                                        <tr>
                                                            <td style="padding:8px 0;width:68px;vertical-align:top;">
                                                                <span style="font-size:12px;color:#9C9890;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">Email</span>
                                                            </td>
                                                            <td style="padding:8px 0 8px 12px;vertical-align:top;">
                                                                <span style="font-size:14px;color:#1A1918;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;"><a href="mailto:{{ sender_email }}" style="color:#CC6138;text-decoration:none;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">{{ sender_email }}</a></span>
                                                            </td>
                                                        </tr>
                                                    </table>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>

                            <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom:24px;">
                                <tr>
                                    <td width="80">&nbsp;</td>
                                    <td>
                                        <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                                            <tr>
                                                <td bgcolor="#ECEAE4" style="border-radius:18px;padding:12px 16px;">
                                                    <div style="font-size:15px;line-height:1.65;color:#1A1918;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">{{ message_html }}</div>
                                                </td>
                                            </tr>
                                        </table>
                                        <p style="margin:5px 0 0;text-align:right;font-size:12px;color:#9C9890;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">{{ name }} &nbsp;&middot;&nbsp; {{ sender_email }}</p>
                                    </td>
                                </tr>
                            </table>

                            <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom:0;">
                                <tr>
                                    <td width="36" valign="top" style="padding-right:10px;">
                                        <table role="presentation" border="0" cellpadding="0" cellspacing="0">
                                            <tr>
                                                <td bgcolor="#CC6138" width="24" style="width:24px;height:24px;border-radius:50%;text-align:center;vertical-align:middle;line-height:24px;">
                                                    <span style="color:#fff;font-size:12px;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">&#x25D0;</span>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                    <td valign="top">
                                        <p style="margin:0 0 0;font-size:15px;line-height:1.65;color:#66635E;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">Reply to this email to respond directly to <strong style="color:#1A1918;">{{ sender_email }}</strong>.</p>
                                    </td>
                                </tr>
                            </table>

                        </td>
                    </tr>

                    <tr>
                        <td style="height:32px;"></td>
                    </tr>

                    <tr>
                        <td style="border-top:1px solid #E2DFD8;padding:14px 24px;">
                            <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td>
                                        <span style="font-size:12px;color:#9C9890;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">
                                            <a href="https://ridwaanhall.com" style="color:#9C9890;text-decoration:none;">ridwaanhall.com</a> &nbsp;&middot;&nbsp; Automated
                                        </span>
                                    </td>
                                    <td align="right">
                                        <span style="font-size:12px;color:#9C9890;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">New Message</span>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>
</html>
