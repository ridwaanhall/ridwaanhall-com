<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body style="margin:0;padding:0;background:#E5E2DB;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;-webkit-font-smoothing:antialiased;">

    <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" bgcolor="#E5E2DB">
        <tr>
            <td align="center" style="padding:40px 16px;">

                <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width:680px;background:#FAF9F7;">

                    <tr>
                        <td bgcolor="#F5F3EF" style="border-bottom:1px solid #E2DFD8;padding:14px 24px;">
                            <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td valign="middle">
                                        <table role="presentation" border="0" cellpadding="0" cellspacing="0">
                                            <tr>
                                                <td bgcolor="#CC6138" width="24" style="width:24px;height:24px;border-radius:50%;text-align:center;vertical-align:middle;line-height:24px;">
                                                    <span style="color:#fff;font-size:12px;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">&#x25D0;</span>
                                                </td>
                                                <td style="padding-left:9px;vertical-align:middle;">
                                                    <span style="color:#1A1918;font-size:14px;font-weight:600;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">ridwaanhall.com</span>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                    <td align="right" valign="middle">
                                        <span style="color:#9C9890;font-size:12px;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">Reply</span>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding:28px 24px 8px;">

                            <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom:16px;">
                                <tr>
                                    <td width="36" valign="top" style="padding-right:10px;">
                                        <table role="presentation" border="0" cellpadding="0" cellspacing="0">
                                            <tr>
                                                <td bgcolor="#CC6138" width="24" style="width:24px;height:24px;border-radius:50%;text-align:center;vertical-align:middle;line-height:24px;">
                                                    <span style="color:#fff;font-size:12px;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">&#x25D0;</span>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                    <td valign="top">
                                        <p style="margin:0 0 0;font-size:15px;line-height:1.65;color:#66635E;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">Hi <strong style="color:#1A1918;">{{ original_name }}</strong>, <strong style="color:#1A1918;">{{ reply_name }}</strong> replied to your guestbook entry at ridwaanhall.com.</p>
                                    </td>
                                </tr>
                            </table>

                            <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom:12px;">
                                <tr>
                                    <td width="80">&nbsp;</td>
                                    <td>
                                        <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                                            <tr>
                                                <td bgcolor="#F0EEE9" style="border-radius:18px;padding:12px 16px;">
                                                    <div style="font-size:13px;line-height:1.65;color:#9C9890;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">{{ original_message_html }}</div>
                                                </td>
                                            </tr>
                                        </table>
                                        <p style="margin:5px 0 0;text-align:right;font-size:12px;color:#9C9890;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">{{ original_name }}</p>
                                    </td>
                                </tr>
                            </table>

                            <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom:24px;">
                                <tr>
                                    <td width="36" valign="top" style="padding-right:10px;">
                                        <table role="presentation" border="0" cellpadding="0" cellspacing="0">
                                            <tr>
                                                <td bgcolor="#CC6138" width="24" style="width:24px;height:24px;border-radius:50%;text-align:center;vertical-align:middle;line-height:24px;">
                                                    <span style="color:#fff;font-size:12px;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">&#x25D0;</span>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                    <td valign="top">
                                        <p style="margin:0 0 7px;font-size:13px;font-weight:600;color:#1A1918;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">{{ reply_name }}</p>
                                        <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                                            <tr>
                                                <td bgcolor="#ECEAE4" style="border-radius:3px 18px 18px 18px;padding:12px 16px;">
                                                    <div style="font-size:15px;line-height:1.65;color:#1A1918;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">{{ reply_message_html }}</div>
                                                </td>
                                            </tr>
                                        </table>
                                        <p style="margin:5px 0 0;font-size:12px;color:#9C9890;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">{{ timestamp }}</p>
                                    </td>
                                </tr>
                            </table>

                            <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom:0;">
                                <tr>
                                    <td width="36" valign="top" style="padding-right:10px;">
                                        <table role="presentation" border="0" cellpadding="0" cellspacing="0">
                                            <tr>
                                                <td bgcolor="#CC6138" width="24" style="width:24px;height:24px;border-radius:50%;text-align:center;vertical-align:middle;line-height:24px;">
                                                    <span style="color:#fff;font-size:12px;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">&#x25D0;</span>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                    <td valign="top">
                                        <table role="presentation" border="0" cellpadding="0" cellspacing="0" style="margin-top:0;">
                                            <tr>
                                                <td bgcolor="#1A1918" style="border-radius:8px;padding:10px 20px;">
                                                    <a href="{{ guestbook_url }}" style="color:#fff;font-size:14px;font-weight:500;text-decoration:none;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">View full conversation →</a>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>

                        </td>
                    </tr>

                    <tr>
                        <td style="height:32px;"></td>
                    </tr>

                    <tr>
                        <td style="border-top:1px solid #E2DFD8;padding:14px 24px;">
                            <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td>
                                        <span style="font-size:12px;color:#9C9890;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">
                                            <a href="https://ridwaanhall.com" style="color:#9C9890;text-decoration:none;">ridwaanhall.com</a> &nbsp;&middot;&nbsp; Automated
                                        </span>
                                    </td>
                                    <td align="right">
                                        <span style="font-size:12px;color:#9C9890;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">Reply</span>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>
</html>
