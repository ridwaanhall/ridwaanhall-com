<div class="mt-8">
    <h2 class="text-xl font-medium flex items-center">
        <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
        </svg>
        Send me a message
    </h2>
    <p class="text-zinc-400 text-sm mt-2 mb-4">Have a thought, a question, or just want to say hello? Leave a note—I read them all.</p>

    <form id="contact-form" method="post" action="{% url 'contact' %}">
        {% csrf_token %}
        <div class="flex flex-grow flex-col gap-4">
            <div class="flex flex-col gap-4 md:flex-row">
                <input
                    class="w-full rounded-md border border-zinc-700 hover:border-zinc-400 px-3 py-2 focus:outline-none focus:border-zinc-400 bg-transparent placeholder-zinc-400 text-zinc-300 hover:text-zinc-200 transition-all duration-300"
                    type="text"
                    placeholder="Name*"
                    name="name"
                    required
                    value=""
                />
                <input
                    class="w-full rounded-md border border-zinc-700 hover:border-zinc-400 px-3 py-2 focus:outline-none focus:border-zinc-400 bg-transparent placeholder-zinc-400 text-zinc-300 hover:text-zinc-200 transition-all duration-300"
                    type="email"
                    placeholder="Email*"
                    name="email"
                    required
                    value=""
                />
            </div>
            <textarea
                class="w-full rounded-md border border-zinc-700 hover:border-zinc-400 px-3 py-2 focus:outline-none focus:border-zinc-400 bg-transparent placeholder-zinc-400 text-zinc-300 hover:text-zinc-200 resize-vertical transition-all duration-300"
                rows="5"
                placeholder="Message*"
                name="message"
                required
            ></textarea>
            {% if USE_CF_TURNSTILE %}
            <div class="cf-turnstile" data-sitekey="{{ CF_TURNSTILE_SITE_KEY }}" data-callback="onTurnstileSuccess" data-theme="dark"></div>
            {% endif %}
            <button
                class="flex cursor-pointer items-center gap-2 rounded-lg border border-zinc-700 hover:border-zinc-400 bg-zinc-800 px-2 py-2 text-base font-medium text-zinc-300 hover:text-zinc-200 hover:bg-zinc-900 hover:shadow-md hover:shadow-zinc-400/20 transition-all duration-300 justify-center"
                type="submit"
                id="submit-btn"
            >
                Begin the conversation
            </button>
        </div>
        <div class="my-5 flex items-center gap-2 text-zinc-400 mt-4">
            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <div class="text-sm"><span class="font-medium">Typical response time:</span> 1–2 hours (Weekdays, GMT+7). I reply with care.</div>
        </div>
    </form>
</div>
