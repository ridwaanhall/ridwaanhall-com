{% comment %}
Application Process section
Shows step-by-step application process
{% endcomment %}
<div class="border border-zinc-700 rounded-lg p-4">
    <h2 class="text-base sm:text-lg md:text-xl font-medium text-zinc-300 text-shadow break-words flex items-center mb-3">
        <svg class="w-5 h-5 mr-3 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path>
        </svg>
        Application Process
    </h2>
    <div class="space-y-2">
        {% for step in hiring_data.application_process %}
        <div class="flex items-start gap-3 p-2 bg-zinc-800/30 rounded">
            <span class="flex-shrink-0 w-6 h-6 bg-indigo-900/30 text-indigo-300 rounded-full flex items-center justify-center text-xs font-medium border border-indigo-700/50">
                {{ forloop.counter }}
            </span>
            <span class="text-sm text-zinc-300">{{ step }}</span>
        </div>
        {% endfor %}
    </div>
</div>
