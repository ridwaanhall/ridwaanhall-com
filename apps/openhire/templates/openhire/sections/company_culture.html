{% comment %}
Company Culture section
Displays company culture values
{% endcomment %}
<div class="border border-zinc-700 rounded-lg p-4">
    <h2 class="text-base sm:text-lg md:text-xl font-medium text-zinc-300 text-shadow break-words flex items-center mb-3">
        <svg class="w-5 h-5 mr-3 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
        </svg>
        Company Culture
    </h2>
    <div class="space-y-1 ml-1">
        {% for culture in hiring_data.company_culture %}
        <div class="flex items-start group">
            <div class="flex-shrink-0 w-3 h-3 mt-0.5">
                <div class="w-1.5 h-1.5 bg-zinc-400 rounded-full mt-1"></div>
            </div>
            <p class="text-sm leading-relaxed text-zinc-400">{{ culture }}</p>
        </div>
        {% endfor %}
    </div>
</div>
