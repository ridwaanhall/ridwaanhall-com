{% comment %}
General Requirements section
Displays general requirements for all positions
{% endcomment %}
<div class="border border-zinc-700 rounded-lg p-4">
    <h2 class="text-base sm:text-lg md:text-xl font-medium text-zinc-300 text-shadow break-words flex items-center mb-3">
        <svg class="w-5 h-5 mr-3 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
        </svg>
        General Requirements
    </h2>
    <div class="space-y-1 ml-1">
        {% for requirement in hiring_data.requirements.general %}
        <div class="flex items-start group">
            <div class="flex-shrink-0 w-3 h-3 mt-0.5">
                <div class="w-1.5 h-1.5 bg-zinc-400 rounded-full mt-1"></div>
            </div>
            <p class="text-sm leading-relaxed text-zinc-400">{{ requirement }}</p>
        </div>
        {% endfor %}
    </div>
</div>
