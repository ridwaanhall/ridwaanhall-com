<div class="mb-6 flex flex-wrap items-center gap-x-4 gap-y-1 text-sm text-zinc-400">
    {% if project.created_at %}
    <span class="inline-flex items-center gap-1.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <time datetime="{{ project.created_at|date:'c' }}">{{ project.created_at|date:"F j, Y" }}</time>
    </span>
    {% endif %}
    {% if project.updated_at %}
    {% if project.created_at %}<span class="text-zinc-600">&middot;</span>{% endif %}
    <span class="inline-flex items-center gap-1.5 italic">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        <time datetime="{{ project.updated_at|date:'c' }}">Updated {{ project.updated_at|date:"F j, Y" }}</time>
    </span>
    {% endif %}
</div>
